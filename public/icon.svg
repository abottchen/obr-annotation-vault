<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Vault body -->
  <rect x="8" y="16" width="48" height="40" rx="4" fill="#3a3a5c" stroke="#8b8bba" stroke-width="2"/>
  <!-- Vault door circle -->
  <circle cx="32" cy="36" r="14" fill="#2a2a44" stroke="#8b8bba" stroke-width="2"/>
  <!-- Vault handle/spoke -->
  <line x1="32" y1="26" x2="32" y2="46" stroke="#bb86fc" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="36" x2="42" y2="36" stroke="#bb86fc" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="29" x2="39" y2="43" stroke="#bb86fc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="39" y1="29" x2="25" y2="43" stroke="#bb86fc" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Vault lock center -->
  <circle cx="32" cy="36" r="3" fill="#bb86fc"/>
  <!-- Top hinges -->
  <rect x="12" y="12" width="8" height="6" rx="1" fill="#5a5a7c" stroke="#8b8bba" stroke-width="1"/>
  <rect x="44" y="12" width="8" height="6" rx="1" fill="#5a5a7c" stroke="#8b8bba" stroke-width="1"/>
</svg>
